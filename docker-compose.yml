volumes:
  postgres-data:
  mongo-data:
  rabbitmq-data:

services:

  configservice:
    build: ./Backend/configservice
    container_name: configservice
    restart: unless-stopped
    ports:
      - "${CONFIG_SERVICE_PORT}:8888"
    environment:
      CONFIG_SERVICE_PORT: ${CONFIG_SERVICE_PORT}
    networks:
      - fitness-network


  eureka:
    build: ./Backend/eureka
    container_name: eureka
    restart: unless-stopped
    ports:
      - "${EUREKA_SERVER_PORT}:8761"
    environment:
      EUREKA_SERVER_PORT: ${EUREKA_SERVER_PORT}
    depends_on:
      - configservice
    networks:
      - fitness-network


  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    #ports:
    #  - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fitness-network
      
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - fitness-network


  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      #- "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - fitness-network


  userservice:
    build: ./Backend/userservice
    container_name: userservice
    restart: unless-stopped
    environment:
      USER_SERVICE_PORT: ${USER_SERVICE_PORT}
      USER_DB_URL: ${USER_DB_URL}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    depends_on:
      - configservice
      - eureka
      - postgres
    networks:
      - fitness-network


  activityservice:
    build: ./Backend/activityservice
    container_name: activityservice
    restart: unless-stopped
    environment:
      ACTIVITY_SERVICE_PORT: ${ACTIVITY_SERVICE_PORT}
      ACTIVITY_MONGO_URI: ${ACTIVITY_MONGO_URI}
      ACTIVITY_MONGO_DATABASE: ${ACTIVITY_MONGO_DATABASE}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      - configservice
      - eureka
      - mongodb
      - rabbitmq
    networks:
      - fitness-network


  aiservice:
    build: ./Backend/aiservice
    container_name: aiservice
    restart: unless-stopped
    environment:
      AI_SERVICE_PORT: ${AI_SERVICE_PORT}
      AI_MONGO_URI: ${AI_MONGO_URI}
      AI_MONGO_DATABASE: ${AI_MONGO_DATABASE}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      - configservice
      - eureka
      - mongodb
      - rabbitmq
    networks:
      - fitness-network


  gateway:
    build: ./Backend/gateway
    container_name: gateway
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT}:8080"
    environment:
      API_GATEWAY_PORT: ${API_GATEWAY_PORT}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      KEYCLOAK_JWK_URI: ${KEYCLOAK_JWK_URI}
    depends_on:
      - configservice
      - eureka
      - userservice
      - activityservice
      - aiservice
    networks:
      - fitness-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    networks:
      - fitness-network


networks:
  fitness-network:
    driver: bridge
